<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Test Tube Guide</title>
  <link rel="stylesheet" href="style.css?v=20260303c" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="brand-title" aria-label="Find my tube">
        <span>F</span><span class="brand-i-tube" aria-hidden="true"></span><span>nd</span>
        <span class="brand-gap"></span>
        <span>my</span>
        <span class="brand-gap"></span>
        <span>tube</span>
      </h1>
      <p>
        Search for a laboratory test to see the correct tube, specimen type,
        turnaround time, and special notes.
      </p>
    </header>

    <section class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by test, alias, condition, or section (e.g. FBC, heart attack, Cardiac Markers)"
      />
    </section>

    <section class="filter-box">
      <label class="filter-item">
        <span>Section</span>
        <select id="sectionFilter">
          <option value="">All sections</option>
        </select>
      </label>
      <label class="filter-item">
        <span>Subsection</span>
        <select id="subsectionFilter">
          <option value="">All subsections</option>
        </select>
      </label>
      <button type="button" class="filter-reset-btn" id="resetFiltersBtn">Reset</button>
    </section>

    <section class="pre-search" id="preSearchPanel">
      <div class="fact-carousel">
        <div class="mini-carousel">
          <p class="fact-kicker">Interesting lab facts</p>
          <p class="fact-text" id="factText"></p>
          <div class="fact-dots" id="factDots"></div>
        </div>
        <div class="mini-carousel">
          <p class="fact-kicker">Quick collection tips</p>
          <p class="fact-text" id="tipText"></p>
          <div class="fact-dots" id="tipDots"></div>
        </div>
      </div>

      <div class="group-hints">
        <h3>Browse by lab section</h3>
        <p>Choose a laboratory discipline to jump into the right test list faster.</p>
        <div class="group-chips" id="groupChips"></div>
      </div>
    </section>

    <p class="results-info" id="resultsInfo"></p>
    <section class="cards" id="cardsContainer"></section>
  </div>

  <script src="data.js?v=20260302"></script>
  <script src="script.js?v=20260303c"></script>
</body>
</html>
